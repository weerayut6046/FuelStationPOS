name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            services/api/package-lock.json
            ui-prototype/package-lock.json

      - name: Validate Docker Compose
        run: docker compose config --quiet

      - name: Build service images
        run: docker compose build

      - name: Install API dependencies
        working-directory: services/api
        run: npm ci

      - name: Test API
        working-directory: services/api
        run: npm test

      - name: Install UI dependencies
        working-directory: ui-prototype
        run: npm ci

      - name: Lint UI
        working-directory: ui-prototype
        run: npm run lint

      - name: Build and test UI
        working-directory: ui-prototype
        run: npm test

      - name: Start Docker stack
        run: docker compose up -d --wait

      - name: Run Docker smoke test
        run: node scripts/docker-smoke.mjs

      - name: Test database backup and restore
        shell: pwsh
        run: |
          $backupFile = ./scripts/backup.ps1
          ./scripts/restore-test.ps1 -BackupFile $backupFile

      - name: Show service logs on failure
        if: failure()
        run: docker compose logs --no-color --tail 200

      - name: Stop Docker stack
        if: always()
        run: docker compose down --volumes
