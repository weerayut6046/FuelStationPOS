name: fuel-station-pos

services:
  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fuelstation}
      POSTGRES_USER: ${POSTGRES_USER:-fuelops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fuelops_dev_change_me}
      TZ: Asia/Bangkok
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fuelops} -d ${POSTGRES_DB:-fuelstation}"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ./services/api
    restart: unless-stopped
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-fuelops}:${POSTGRES_PASSWORD:-fuelops_dev_change_me}@database:5432/${POSTGRES_DB:-fuelstation}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      TZ: Asia/Bangkok
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./ui-prototype
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:3001}
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:3001}
      TZ: Asia/Bangkok
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
